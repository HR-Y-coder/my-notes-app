name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Reconstruct Project Properly
        run: |
          # 1. 把你的代码搬到“安全屋”（GitHub 虚拟机的上一层目录）
          mkdir -p ../safe_zone
          cp -r lib pubspec.yaml ../safe_zone/
          
          # 2. 彻底清空当前目录，重新生成干净的 Flutter 结构（包含 android 目录）
          rm -rf *
          flutter create --project-name my_notes_app . --force
          
          # 3. 把你的代码从“安全屋”搬回来，覆盖掉默认模板
          rm -rf lib pubspec.yaml
          cp -r ../safe_zone/lib .
          cp ../safe_zone/pubspec.yaml .
          
          # 4. 解决手机上的 SocketException：自动注入联网权限
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
