name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Force Reconstruct Project
        run: |
          # 1. 确保代码不会丢：把现有的 lib 和配置拷贝到安全的地方
          mkdir -p ../safe_backup
          cp -r lib ../safe_backup/
          cp pubspec.yaml ../safe_backup/
          
          # 2. 清理当前目录，重新生成干净的 Flutter 结构（包含 android 目录）
          rm -rf *
          flutter create --project-name my_notes_app .
          
          # 3. 把核心代码换回来
          rm -rf lib pubspec.yaml
          cp -r ../safe_backup/lib .
          cp ../safe_backup/pubspec.yaml .
          
          # 4. 关键：注入 Android 联网权限，解决 SocketException
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
