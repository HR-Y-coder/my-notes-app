name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Reconstruct Project Shell
        run: |
          # 1. 备份你的代码和配置文件
          mkdir backup_files
          cp -r lib backup_files/
          cp pubspec.yaml backup_files/
          
          # 2. 清理当前目录并重新生成完整的 Flutter 工程
          rm -rf *
          flutter create --project-name my_notes_app .
          
          # 3. 把你的代码还原回去
          rm -rf lib
          cp -r backup_files/lib .
          cp backup_files/pubspec.yaml .
          
          # 4. 自动注入 Android 联网权限（解决 SocketException）
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
