name: Flutter Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # 核心步骤：如果发现只有代码没骨架，服务器会自动造一个底座
      - name: Create Project Scaffold
        run: |
          mkdir temp_app
          flutter create --project-name my_notes_app ./temp_app
          # 检查你的 main.dart 是在根目录还是 lib 里，并覆盖到新项目中
          if [ -f "lib/main.dart" ]; then
            cp lib/main.dart temp_app/lib/main.dart
          else
            cp main.dart temp_app/lib/main.dart
          fi
          cp pubspec.yaml temp_app/pubspec.yaml
          # 将生成的全套 Android/iOS 骨架移回根目录
          mv temp_app/* .
          mv temp_app/.[!.]* .
          rm -rf temp_app

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: note-app-apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
