name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Reconstruct Project Environment
        run: |
          # 1. 把你的核心代码暂时挪走
          mkdir temp_code
          cp -r lib temp_code/
          cp pubspec.yaml temp_code/
          
          # 2. 强力清理并重新生成完整的 Flutter 项目壳子
          rm -rf lib pubspec.yaml
          flutter create --project-name my_notes_app .
          
          # 3. 把你的代码换回去，覆盖掉默认的模板
          rm -rf lib pubspec.yaml
          cp -r temp_code/lib .
          cp temp_code/pubspec.yaml .
          
          # 4. 关键：注入 Android 联网权限 (解决你手机上的 SocketException)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
